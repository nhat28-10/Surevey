name: Backend CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    name: Backend check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/SurveyWeb

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --name-only "$base" "$head" | grep -q '^backend/SurveyWeb/'; then
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend_changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip backend build
        if: steps.changes.outputs.backend_changed != 'true'
        run: echo "No backend changes detected."

      - name: Setup .NET
        if: steps.changes.outputs.backend_changed == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        if: steps.changes.outputs.backend_changed == 'true'
        run: dotnet restore SurveyWeb.sln

      - name: Build
        if: steps.changes.outputs.backend_changed == 'true'
        run: dotnet build SurveyWeb.sln --configuration Release --no-restore
